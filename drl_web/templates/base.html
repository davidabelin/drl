<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script>
      window.__APP_BASE_PATH__ = "{{ app_base_path|tojson }}";
    </script>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <header class="site-header">
      <a class="brand" href="{{ url_for('main.home') }}">DRL Labs</a>
      <nav class="site-nav">
        <a href="{{ url_for('main.home') }}">Overview</a>
        <a href="{{ url_for('main.inventory_page') }}">Inventory</a>
        <a href="{{ url_for('main.lunar_page') }}">Lunar</a>
        <a href="{{ url_for('main.grabber_page') }}">Grabber</a>
        {% for section in catalog_sections %}
        <a href="{{ url_for('main.section_page', slug=section.slug) }}">{{ section.nav_label }}</a>
        {% endfor %}
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-copy">
          <img class="copyleft-mark" src="{{ url_for('static', filename='icons/copyleft.svg') }}" alt="" aria-hidden="true" width="16" height="16">
          <span>2026 DRL Lab</span>
        </p>
        <nav class="footer-links" aria-label="DRL footer">
		  <a href="{{ url_for('main.home') }}">Deep Reinforcement Learning Labs</a>
        </nav>
      </div>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
